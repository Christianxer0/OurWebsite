<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasig Gallery | Landmarks</title>
    <link rel="stylesheet" href="landmarks.css">
</head>
<body>

    <a href="Gallery.html" class="return-btn">
        <span>&lsaquo;</span> Back to Gallery
    </a>

    <header class="landmark-hero">
        <div class="hero-content">
            <div class="subtitle">Historical Heritage</div>
            <h1>PASIG LANDMARKS</h1>
            <p>Walking through the stories and structures of our past.</p>
        </div>
        
        <div class="wave-divider"></div>
    </header>

    <section class="filter-container">
        <a href="Gallery.html" class="filter-link">All</a>
        <a href="gallerylandmarks.html" class="filter-link active">Landmarks</a>
        <a href="galleryfestivals.html" class="filter-link">Festivals</a>
    </section>

    <section class="gallery-wrapper">
        <div class="landmark-grid">
            <div class="item large">
                <img src="Cathedral.jpg" alt="Cathedral">
                <div class="label">Immaculate Conception Cathedral</div>
            </div>
            <div class="item">
                <img src="bahay tisa.jpg" alt="Bahay na Tisa">
                <div class="label">Bahay na Tisa</div>
            </div>
            <div class="item">
                <img src="Dimasalang.jpg" alt="Dimas-alang">
                <div class="label">Dimas-alang</div>
            </div>
            <div class="item">
                <img src="Guino.jpg" alt="Guanio House">
                <div class="label">Guanio House</div>
            </div>
            <div class="item">
                <img src="plaza rizal.jpg" alt="Plaza Rizal">
                <div class="label">Plaza Rizal</div>
            </div>
        </div>
    </section>

</body>
</html>
