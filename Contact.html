<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasig City | Contact Developers</title>
    <link rel="stylesheet" href="Contact.css">
</head>
<body>

    <div class="back-container">
        <a href="Index.html" class="back-btn">← Back to Home</a>
    </div>

    <header class="contact-hero">
        <h1>Contact the Developer Team</h1>
        <p>Building a digital bridge for the people of Pasig.</p>
    </header>

    <main class="content-container">
        <section class="team-section">
            <h2 class="section-title">Meet the Developer Team</h2>
            <div class="team-grid" id="teamGrid">
                </div>
        </section>

        <section class="form-section">
            <div class="glass-form-card" id="formContainer">
                <h2>Send a Message</h2>
                <form id="contactForm" novalidate>
                    <div class="input-group">
                        <label for="userName">Full Name</label>
                        <input type="text" id="userName" placeholder="Juan Dela Cruz" required>
                        <span class="error-msg">Please enter your name</span>
                    </div>
                    <div class="input-group">
                        <label for="userEmail">Email Address</label>
                        <input type="email" id="userEmail" placeholder="juan@email.com" required>
                        <span class="error-msg">Valid email required</span>
                    </div>
                    <div class="input-group">
                        <label for="userMessage">Message</label>
                        <textarea id="userMessage" rows="5" placeholder="How can we help?" required></textarea>
                        <span class="error-msg">Message cannot be empty</span>
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Send Message</span>
                        <div class="loader" id="loader"></div>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script src="Contact.js"></script>
</body>
</html>
