<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasig Gallery | Landmarks</title>
    <link rel="stylesheet" href="galleryfestivals.css">
</head>
<body>

    <a href="Gallery.html" class="return-btn">
        <span>&lsaquo;</span> Back to Gallery
    </a>

    <header class="landmark-hero">
        <div class="hero-content">
            <div class="subtitle">Historical Heritage</div>
            <h1>PASIG LANDMARKS</h1>
            <p>Parading through the pulse of our past and the pillars of our pride!</p>
        </div>
        
        <div class="wave-divider"></div>
    </header>

    <section class="filter-container">
        <a href="Gallery.html" class="filter-link">All</a>
        <a href="gallerylandmarks.html" class="filter-link">Landmarks</a>
        <a href="galleryfestivals.html" class="filter-link active">Festivals</a>
    </section>

    <section class="gallery-wrapper">
        <div class="landmark-grid">
            <div class="item large">
                <img src="Bambino.jpg" alt="Bambino Festival">
                <div class="label">Bambino Festival</div>
            </div>
            <div class="item">
                <img src="Sunduan.jpg" alt="Sunduan Festival ">
                <div class="label">Sunduan Festival </div>
            </div>
            <div class="item">
                <img src="Pakalog.jpg" alt="Pakalog Festival">
                <div class="label">Pakalog Festival</div>
            </div>
            <div class="item">
                <img src="Bayanihan.jpg" alt="Bayanihan Festival">
                <div class="label">Bayanihan Festival</div>
            </div>
            <div class="item">
                <img src="Iwasiwas.jpg" alt="Iwasiwas Festival">
                <div class="label">Iwasiwas Festival</div>
            </div>
        </div>
    </section>

</body>
</html>
